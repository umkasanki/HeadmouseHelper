<svg viewBox="0 0 152 112" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded rectangle (height 100) filled with colour, with knockouts:
       a centered circle (diameter 80 = 80% of the height) plus two
       small circles in the top corners, between the corner and the big circle.
       Uses currentColor so the fill can be tinted per state. -->
  <defs>
    <mask id="holes">
      <rect x="6" y="6" width="140" height="100" rx="16" fill="white"/>
      <circle cx="76" cy="56" r="40" fill="black"/>
      <circle cx="22" cy="22" r="8" fill="black"/>
      <circle cx="130" cy="22" r="8" fill="black"/>
    </mask>
  </defs>
  <rect x="6" y="6" width="140" height="100" rx="16" fill="currentColor" mask="url(#holes)"/>
</svg>
